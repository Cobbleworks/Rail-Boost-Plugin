name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn package -B --no-transfer-progress

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Compute release display name
        id: meta
        run: |
          REPO_NAME='${{ github.event.repository.name }}'
          DISPLAY_NAME="${REPO_NAME%-Plugin}"
          DISPLAY_NAME="${DISPLAY_NAME//-/ }"
          echo "DISPLAY_NAME=$DISPLAY_NAME" >> $GITHUB_OUTPUT

      - name: Extract changelog notes
        id: changelog
        run: |
          python3 - <<'PYEOF'
          import re
          import sys

          version = '${{ steps.version.outputs.VERSION }}'

          try:
              with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
                  content = f.read()
              pattern = rf'(?m)^## \[{re.escape(version)}\].*?\n(.*?)(?=\n^## \[|\Z)'
              match = re.search(pattern, content, re.DOTALL)
            if not match:
              print(f'ERROR: Missing CHANGELOG section for version {version}', file=sys.stderr)
              sys.exit(1)
            notes = match.group(1).strip()
          except FileNotFoundError:
            print('ERROR: CHANGELOG.md not found', file=sys.stderr)
            sys.exit(1)

          notes = notes.replace('├ö├ç├Â', '-')
          notes = notes.replace('ÔÇö', '-')
          notes = notes.replace('â€”', '-')
          notes = notes.replace('â€“', '-')
          notes = notes.replace('ÔÇô', '-')

          with open('release_notes.txt', 'w', encoding='utf-8') as f:
              f.write(notes)
          PYEOF

      - name: Locate JAR artifact
        id: jar
        run: |
          JAR=$(find target -maxdepth 1 -name "*.jar" ! -name "*sources*" ! -name "*javadoc*" ! -name "original-*.jar" | head -1)
          if [ -z "$JAR" ]; then
            echo "ERROR: No release JAR found in target/"
            exit 1
          fi
          echo "JAR_PATH=$JAR" >> $GITHUB_OUTPUT
          echo "JAR_NAME=$(basename $JAR)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.meta.outputs.DISPLAY_NAME }} ${{ github.ref_name }}
          body_path: release_notes.txt
          files: ${{ steps.jar.outputs.JAR_PATH }}
          draft: false
          prerelease: false

